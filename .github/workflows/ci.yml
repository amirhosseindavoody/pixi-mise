name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          cache: true
          locked: true

      - name: Format
        run: pixi run fmt-check

      - name: Clippy
        run: pixi run clippy

      - name: Test
        run: pixi run test

      - name: Build binary
        run: pixi run build

      - name: Build conda package
        run: pixi run package

      - name: Upload conda package
        uses: actions/upload-artifact@v4
        with:
          name: pixi-mise-conda
          path: dist/*.conda
          if-no-files-found: error
